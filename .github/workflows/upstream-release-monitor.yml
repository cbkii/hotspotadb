name: Upstream Release Monitor

on:
  schedule:
    - cron: "25 5 * * *"
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "Optional upstream repo override, owner/name"
        required: false
        type: string
      upstream_tag:
        description: "Optional exact upstream latest tag/ref to replay"
        required: false
        type: string
      upstream_base_tag:
        description: "Optional upstream base tag/ref for release-to-release diff"
        required: false
        type: string
      include_prerelease:
        description: "Consider prereleases when selecting latest upstream release"
        required: false
        type: boolean
        default: false
      force:
        description: "Bypass duplicate/resolved suppression"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: upstream-release-monitor-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  monitor-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run upstream release monitor
        id: monitor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          python3 scripts/upstream_release_monitor.py \
            --repo "${{ github.repository }}" \
            ${{ inputs.upstream_repo && format('--upstream-repo "{0}"', inputs.upstream_repo) || '--upstream-repo "droserasprout/io.drsr.hotspotadb"' }} \
            ${{ inputs.upstream_tag && format('--head-tag "{0}"', inputs.upstream_tag) || '' }} \
            ${{ inputs.upstream_base_tag && format('--base-tag "{0}"', inputs.upstream_base_tag) || '' }} \
            ${{ inputs.include_prerelease && '--include-prerelease' || '' }} \
            ${{ inputs.force && '--force' || '' }} \
            --out-dir artifacts

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-monitor-artifacts
          path: artifacts/
