name: Upstream Release Monitor

on:
  schedule:
    - cron: "25 5 * * *"
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "Optional upstream repo override, owner/name"
        required: false
        type: string
      upstream_tag:
        description: "Optional exact upstream latest tag/ref to replay"
        required: false
        type: string
      upstream_base_tag:
        description: "Optional upstream base tag/ref for release-to-release diff"
        required: false
        type: string
      include_prerelease:
        description: "Consider prereleases when selecting latest upstream release"
        required: false
        type: boolean
        default: false
      force:
        description: "Bypass duplicate/resolved suppression"
        required: false
        type: boolean
        default: false

run-name: "Upstream Monitor: ${{ inputs.upstream_repo || 'default' }} ${{ inputs.upstream_tag || 'latest' }}"

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-release-monitor
  cancel-in-progress: false

jobs:
  monitor-upstream:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Run upstream release monitor
        id: monitor
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo || 'droserasprout/io.drsr.hotspotadb' }}
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          UPSTREAM_BASE_TAG: ${{ inputs.upstream_base_tag }}
          INCLUDE_PRERELEASE: ${{ inputs.include_prerelease }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          mkdir -p artifacts
          args=(
            --repo "${GITHUB_REPOSITORY}"
            --upstream-repo "${UPSTREAM_REPO}"
            --out-dir artifacts
          )

          if [[ -n "${UPSTREAM_TAG:-}" ]]; then
            args+=(--head-tag "$UPSTREAM_TAG")
          fi
          if [[ -n "${UPSTREAM_BASE_TAG:-}" ]]; then
            args+=(--base-tag "$UPSTREAM_BASE_TAG")
          fi
          if [[ "${INCLUDE_PRERELEASE:-false}" == "true" ]]; then
            args+=(--include-prerelease)
          fi
          if [[ "${FORCE:-false}" == "true" ]]; then
            args+=(--force)
          fi

          # The script is responsible for generating its own step summary
          # and it uses strict exit codes. We run it directly.
          python3 scripts/upstream_release_monitor.py "${args[@]}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: upstream-monitor-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: error
