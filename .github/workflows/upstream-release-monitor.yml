name: Upstream Release Monitor

on:
  schedule:
    - cron: "25 5 * * *"
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "Optional upstream repo override, owner/name"
        required: false
        type: string
      upstream_tag:
        description: "Optional exact upstream latest tag/ref to replay"
        required: false
        type: string
      upstream_base_tag:
        description: "Optional upstream base tag/ref for release-to-release diff"
        required: false
        type: string
      include_prerelease:
        description: "Consider prereleases when selecting latest upstream release"
        required: false
        type: boolean
        default: false
      force:
        description: "Bypass duplicate/resolved suppression"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: upstream-release-monitor-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  monitor-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run upstream release monitor
        id: monitor
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo || 'droserasprout/io.drsr.hotspotadb' }}
          UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          UPSTREAM_BASE_TAG: ${{ inputs.upstream_base_tag }}
          INCLUDE_PRERELEASE: ${{ inputs.include_prerelease }}
          FORCE: ${{ inputs.force }}
        run: |
          mkdir -p artifacts
          args=(
            --repo "${GITHUB_REPOSITORY}"
            --upstream-repo "${UPSTREAM_REPO}"
            --out-dir artifacts
          )

          if [[ -n "${UPSTREAM_TAG:-}" ]]; then
            args+=(--head-tag "$UPSTREAM_TAG")
          fi
          if [[ -n "${UPSTREAM_BASE_TAG:-}" ]]; then
            args+=(--base-tag "$UPSTREAM_BASE_TAG")
          fi
          if [[ "${INCLUDE_PRERELEASE:-false}" == "true" ]]; then
            args+=(--include-prerelease)
          fi
          if [[ "${FORCE:-false}" == "true" ]]; then
            args+=(--force)
          fi

          python3 scripts/upstream_release_monitor.py "${args[@]}"

          if [[ ! -f artifacts/upstream-monitor-report.md ]]; then
            echo "::error::Monitor did not produce expected report artifact."
            # fail softly in bash session but this will fail the action
            false
          fi

          echo "## Upstream monitor summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Monitor executed successfully." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-monitor-artifacts
          path: artifacts/
