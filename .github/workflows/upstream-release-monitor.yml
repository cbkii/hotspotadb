name: Upstream Release Monitor

on:
  schedule:
    - cron: "25 5 * * *"
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "Optional upstream repo override, owner/name"
        required: false
        type: string
      upstream_tag:
        description: "Optional exact upstream latest tag/ref to replay"
        required: false
        type: string
      upstream_base_tag:
        description: "Optional upstream base tag/ref for release-to-release diff"
        required: false
        type: string
      include_prerelease:
        description: "Consider prereleases when selecting the latest upstream release"
        required: false
        type: boolean
        default: false
      force:
        description: "Bypass resolved/integrated/closed/duplicate suppression, never errors"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Generate complete evidence without creating or updating an issue"
        required: false
        type: boolean
        default: false

run-name: "Upstream Monitor: ${{ inputs.upstream_repo || 'default' }} ${{ inputs.upstream_tag || 'latest' }}"

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-release-monitor
  cancel-in-progress: false

jobs:
  monitor-upstream:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Run upstream release monitor
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo || 'droserasprout/io.drsr.hotspotadb' }}
          UPSTREAM_TAG: ${{ inputs.upstream_tag || '' }}
          UPSTREAM_BASE_TAG: ${{ inputs.upstream_base_tag || '' }}
          INCLUDE_PRERELEASE: ${{ inputs.include_prerelease || false }}
          FORCE: ${{ inputs.force || false }}
          DRY_RUN: ${{ inputs.dry_run || false }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          args=(
            --repo "${GITHUB_REPOSITORY}"
            --upstream-repo "${UPSTREAM_REPO}"
            --out-dir artifacts
          )

          if [[ -n "${UPSTREAM_TAG}" ]]; then
            args+=(--head-tag "${UPSTREAM_TAG}")
          fi
          if [[ -n "${UPSTREAM_BASE_TAG}" ]]; then
            args+=(--base-tag "${UPSTREAM_BASE_TAG}")
          fi
          if [[ "${INCLUDE_PRERELEASE}" == "true" ]]; then
            args+=(--include-prerelease)
          fi
          if [[ "${FORCE}" == "true" ]]; then
            args+=(--force)
          fi
          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi

          python3 scripts/upstream_release_monitor.py "${args[@]}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upstream-monitor-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: error
