name: Kotlin Format Preview

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**/*.kt"
      - "**/*.gradle.kts"
      - ".github/workflows/format-preview.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format-preview:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 29
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;35.0.0 platforms;android-36 platform-tools cmdline-tools;latest'

      - uses: gradle/actions/setup-gradle@v4

      - name: Apply repository Kotlin formatter
        run: ./gradlew --no-daemon ktlintFormat

      - name: Record formatting diff
        run: git diff -- app '*.gradle.kts' > ktlint-format.patch

      - uses: actions/upload-artifact@v4
        with:
          name: ktlint-formatted-tree
          path: |
            app/src/**/*.kt
            app/*.gradle.kts
            *.gradle.kts
            ktlint-format.patch
          if-no-files-found: error
