name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Exact Git tag / GitHub Release tag. Leave blank to use versionName from app/build.gradle.kts."
        required: false
        default: ""
      name:
        description: "GitHub Release title. Leave blank to use the resolved tag."
        required: false
        default: ""
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false

run-name: "Release APK: ${{ inputs.tag || 'versionName' }}"

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve and validate release metadata
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_NAME: ${{ inputs.name }}
        run: |
          set -euo pipefail

          VERSION_NAME="$(
            sed -n \
              's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' \
              app/build.gradle.kts |
              head -n 1
          )"
          VERSION_CODE="$(
            sed -n \
              's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*\([0-9][0-9]*\).*/\1/p' \
              app/build.gradle.kts |
              head -n 1
          )"

          [[ -n "$VERSION_NAME" ]] || {
            echo "::error::Could not parse versionName from app/build.gradle.kts"
            exit 1
          }
          [[ -n "$VERSION_CODE" ]] || {
            echo "::error::Could not parse versionCode from app/build.gradle.kts"
            exit 1
          }

          TAG="${INPUT_TAG:-$VERSION_NAME}"
          RELEASE_NAME="${INPUT_NAME:-$TAG}"

          [[ ${#TAG} -le 128 ]] || {
            echo "::error::Release tag exceeds 128 characters"
            exit 1
          }
          [[ ${#RELEASE_NAME} -le 256 ]] || {
            echo "::error::Release title exceeds 256 characters"
            exit 1
          }

          if LC_ALL=C printf '%s' "$RELEASE_NAME" | grep -q '[[:cntrl:]]'; then
            echo "::error::Release title must not contain control characters or newlines"
            exit 1
          fi

          git check-ref-format "refs/tags/$TAG" >/dev/null || {
            echo "::error::Invalid Git tag: $TAG"
            exit 1
          }

          git fetch --force --tags origin

          EXISTING_SHA="$(
            git rev-parse -q --verify "refs/tags/${TAG}^{commit}" 2>/dev/null || true
          )"
          if [[ -n "$EXISTING_SHA" && "$EXISTING_SHA" != "$GITHUB_SHA" ]]; then
            echo "::error::Tag $TAG already points to $EXISTING_SHA, not $GITHUB_SHA"
            exit 1
          fi

          if [[ -n "$EXISTING_SHA" ]]; then
            TAG_EXISTS=true
            echo "Tag $TAG already points to the selected release commit; rerun is idempotent."
          else
            TAG_EXISTS=false
          fi

          SAFE_TAG="$(
            LC_ALL=C printf '%s' "$TAG" |
              sed 's/[^A-Za-z0-9._+-]/-/g'
          )"
          TAG_HASH="$(printf '%s' "$TAG" | sha256sum | cut -c1-12)"
          if [[ -z "$SAFE_TAG" ]]; then
            SAFE_TAG="tag-$TAG_HASH"
          elif [[ "$SAFE_TAG" != "$TAG" ]]; then
            SAFE_TAG="${SAFE_TAG}-${TAG_HASH}"
          fi

          APK_BASENAME="hotspotadb-${SAFE_TAG}.apk"
          SHA256_NAME="${APK_BASENAME}.sha256"

          {
            printf 'version_name=%s\n' "$VERSION_NAME"
            printf 'version_code=%s\n' "$VERSION_CODE"
            printf 'tag=%s\n' "$TAG"
            printf 'release_name=%s\n' "$RELEASE_NAME"
            printf 'safe_tag=%s\n' "$SAFE_TAG"
            printf 'tag_exists=%s\n' "$TAG_EXISTS"
            printf 'apk_basename=%s\n' "$APK_BASENAME"
            printf 'sha256_name=%s\n' "$SHA256_NAME"
          } >> "$GITHUB_OUTPUT"

          printf 'Resolved versionName: %s\n' "$VERSION_NAME"
          printf 'Resolved versionCode: %s\n' "$VERSION_CODE"
          printf 'Release tag: %s\n' "$TAG"
          printf 'Release title: %s\n' "$RELEASE_NAME"

      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          MISSING=()
          [[ -n "$KEYSTORE_BASE64" ]] || MISSING+=(KEYSTORE_BASE64)
          [[ -n "$KEYSTORE_PASSWORD" ]] || MISSING+=(KEYSTORE_PASSWORD)
          [[ -n "$KEY_ALIAS" ]] || MISSING+=(KEY_ALIAS)
          [[ -n "$KEY_PASSWORD" ]] || MISSING+=(KEY_PASSWORD)

          if (( ${#MISSING[@]} > 0 )); then
            printf '::error::Missing required repository secrets: %s\n' "${MISSING[*]}"
            echo "::error::Configure them under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          if ! printf '%s' "$KEYSTORE_BASE64" |
            tr -d '[:space:]' |
            base64 --decode >/dev/null 2>&1; then
            echo "::error::KEYSTORE_BASE64 is not valid base64"
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Decode and validate keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          umask 077

          KEYSTORE_PATH="${RUNNER_TEMP}/hotspotadb-release.keystore"
          printf '%s' "$KEYSTORE_BASE64" |
            tr -d '[:space:]' |
            base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -noprompt >/dev/null

          printf 'KEYSTORE_PATH=%s\n' "$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        with:
          packages: "build-tools;35.0.0 platforms;android-36 platform-tools cmdline-tools;latest"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Build signed release APK
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew --no-daemon clean assembleRelease

      - name: Inspect, validate and package APK
        id: apk
        shell: bash
        env:
          APK_BASENAME: ${{ steps.meta.outputs.apk_basename }}
          SHA256_NAME: ${{ steps.meta.outputs.sha256_name }}
        run: |
          set -euo pipefail

          mapfile -d '' -t APKS < <(
            find app/build/outputs/apk/release \
              -maxdepth 1 \
              -type f \
              -name '*.apk' \
              -print0 |
              sort -z
          )

          if (( ${#APKS[@]} != 1 )); then
            printf '::error::Expected exactly one release APK, found %d\n' "${#APKS[@]}"
            printf 'Candidate: %s\n' "${APKS[@]:-<none>}"
            exit 1
          fi
          APK_PATH="${APKS[0]}"

          if unzip -p "$APK_PATH" META-INF/xposed/module.prop >/dev/null 2>&1; then
            for FILE in \
              META-INF/xposed/java_init.list \
              META-INF/xposed/scope.list \
              META-INF/xposed/module.prop; do
              unzip -p "$APK_PATH" "$FILE" >/dev/null 2>&1 || {
                echo "::error::Missing packaged module file: $FILE"
                exit 1
              }
            done

            unzip -p "$APK_PATH" META-INF/xposed/java_init.list |
              grep -qx 'io.drsr.hotspotadb.HotspotAdbModule' || {
              echo "::error::Unexpected libxposed entry point"
              exit 1
            }

            for SCOPE in com.android.settings android; do
              unzip -p "$APK_PATH" META-INF/xposed/scope.list |
                grep -qx "$SCOPE" || {
                echo "::error::scope.list missing scope: $SCOPE"
                exit 1
              }
            done

            for PROPERTY in \
              'minApiVersion=101' \
              'targetApiVersion=101' \
              'staticScope=true'; do
              unzip -p "$APK_PATH" META-INF/xposed/module.prop |
                grep -qx "$PROPERTY" || {
                echo "::error::module.prop missing: $PROPERTY"
                exit 1
              }
            done
          elif unzip -p "$APK_PATH" assets/xposed_init >/dev/null 2>&1; then
            unzip -p "$APK_PATH" assets/xposed_init |
              grep -qx 'io.drsr.hotspotadb.HotspotAdbModule' || {
              echo "::error::Unexpected legacy Xposed entry point"
              exit 1
            }
          else
            echo "::error::APK contains neither libxposed metadata nor assets/xposed_init"
            exit 1
          fi

          RELEASE_DIR="${RUNNER_TEMP}/hotspotadb-release-artifacts"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          cp -- "$APK_PATH" "${RELEASE_DIR}/${APK_BASENAME}"
          (
            cd "$RELEASE_DIR"
            sha256sum "$APK_BASENAME" > "$SHA256_NAME"
          )

          printf 'release_apk=%s\n' "${RELEASE_DIR}/${APK_BASENAME}" >> "$GITHUB_OUTPUT"
          printf 'release_sha256=%s\n' "${RELEASE_DIR}/${SHA256_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload signed artifacts to workflow run
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-apk-${{ steps.meta.outputs.safe_tag }}
          path: |
            ${{ steps.apk.outputs.release_apk }}
            ${{ steps.apk.outputs.release_sha256 }}
          if-no-files-found: error
          retention-days: 14

      - name: Create release tag
        if: steps.meta.outputs.tag_exists != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${RELEASE_TAG}" \
            -f "sha=${GITHUB_SHA}"
          echo "Created tag $RELEASE_TAG at $GITHUB_SHA"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          files: |
            ${{ steps.apk.outputs.release_apk }}
            ${{ steps.apk.outputs.release_sha256 }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Remove decoded keystore
        if: always()
        shell: bash
        run: rm -f -- "${RUNNER_TEMP}/hotspotadb-release.keystore"
