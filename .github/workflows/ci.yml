name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/**"
      - "detekt.yml"
      - ".editorconfig"
      - "scripts/**"
      - "tests/**"
      - ".github/upstream-release-resolved-tags.txt"
      - ".github/upstream-file-map.json"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/**"
      - "detekt.yml"
      - ".editorconfig"
      - "scripts/**"
      - "tests/**"
      - ".github/upstream-release-resolved-tags.txt"
      - ".github/upstream-file-map.json"
  workflow_dispatch:

jobs:
  monitor-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

      - name: Run Python compile check
        run: python3 -m compileall -q scripts tests

      - name: Run monitor unit tests
        run: python3 -m unittest discover -s tests -p 'test_upstream_release_monitor.py' -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;35.0.0 platforms;android-36 platform-tools cmdline-tools;latest'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run Kotlin checks and unit tests
        run: ./gradlew --no-daemon ktlintCheck detekt testDebugUnitTest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;35.0.0 platforms;android-36 platform-tools cmdline-tools;latest'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      # Validates Xposed module packaging in the built APK.
      # Supports both legacy Xposed (assets/xposed_init) and modern libxposed
      # (META-INF/xposed/*). Hard-fails if neither entry point is present.
      # Note: runtime hook behaviour on Android 16 requires manual device verification with LSPosed.
      - name: Validate module packaging
        run: ./scripts/validate-module.sh

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
