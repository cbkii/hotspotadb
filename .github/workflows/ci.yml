name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/**"
      - "detekt.yml"
      - ".editorconfig"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/**"
      - "detekt.yml"
      - ".editorconfig"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint and detekt
        run: ./gradlew --no-daemon ktlintCheck detekt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      # Validates Xposed module packaging in the built APK.
      # Supports both legacy Xposed (assets/xposed_init) and modern libxposed
      # (META-INF/xposed/*). Hard-fails if neither entry point is present.
      # Note: runtime hook behaviour on Android 16 requires manual device verification with LSPosed.
      - name: Validate module packaging
        run: ./scripts/validate-module.sh

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
