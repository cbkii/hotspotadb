name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/**"
      - "detekt.yml"
      - ".editorconfig"
      - "scripts/**"
      - "tests/**"
      - ".github/upstream-release-resolved-tags.txt"
      - ".github/upstream-file-map.json"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/**"
      - "detekt.yml"
      - ".editorconfig"
      - "scripts/**"
      - "tests/**"
      - ".github/upstream-release-resolved-tags.txt"
      - ".github/upstream-file-map.json"
  workflow_dispatch:

jobs:
  monitor-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install pinned actionlint
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP}/actionlint"
          installer="${RUNNER_TEMP}/download-actionlint.bash"
          mkdir -p "${install_dir}"
          curl -fsSL \
            "https://raw.githubusercontent.com/rhysd/actionlint/914e7df21a07ef503a81201c76d2b11c789d3fca/scripts/download-actionlint.bash" \
            -o "${installer}"
          bash "${installer}" 1.7.12 "${install_dir}"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run actionlint
        run: actionlint -color

      - name: Install pinned Python validation tools
        run: python3 -m pip install --disable-pip-version-check ruff==0.15.20

      - name: Run Ruff
        run: |
          ruff check scripts/upstream_*.py tests/test_upstream_release_monitor.py
          ruff format --check scripts/upstream_*.py tests/test_upstream_release_monitor.py

      - name: Run Python compile check
        run: python3 -m compileall -q scripts tests

      - name: Run monitor unit tests
        run: python3 -m unittest discover -s tests -p 'test_upstream_release_monitor.py' -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;35.0.0 platforms;android-36 platform-tools cmdline-tools;latest'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint and detekt
        run: ./gradlew --no-daemon ktlintCheck detekt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3
        with:
          packages: 'build-tools;35.0.0 platforms;android-36 platform-tools cmdline-tools;latest'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      # Validates Xposed module packaging in the built APK.
      # Supports both legacy Xposed (assets/xposed_init) and modern libxposed
      # (META-INF/xposed/*). Hard-fails if neither entry point is present.
      # Note: runtime hook behaviour on Android 16 requires manual device verification with LSPosed.
      - name: Validate module packaging
        run: ./scripts/validate-module.sh

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
